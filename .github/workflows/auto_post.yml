name: Auto Revenue Blog Publisher

on:
  schedule:
    # ─── KST 기준 포스팅 스케줄 (UTC = KST - 9) ───────────────────────────
    # [adpick] 하루 6회 – 애드픽 API 사용 (아침/야간)
    - cron: '30 21 * * *'  # 06:30 KST  애드픽
    - cron: '0 23 * * *'   # 08:00 KST  애드픽
    - cron: '0 0 * * *'    # 09:00 KST  애드픽
    - cron: '30 1 * * *'   # 10:30 KST  애드픽
    - cron: '0 2 * * *'    # 11:00 KST  애드픽
    - cron: '0 12 * * *'   # 21:00 KST  애드픽

    # [ai_news] 하루 7회 – IT/AI 트렌드 분석
    - cron: '0 3 * * *'    # 12:00 KST  AI뉴스
    - cron: '0 5 * * *'    # 14:00 KST  AI뉴스
    - cron: '0 6 * * *'    # 15:00 KST  AI뉴스
    - cron: '0 8 * * *'    # 17:00 KST  AI뉴스
    - cron: '30 8 * * *'   # 17:30 KST  AI뉴스
    - cron: '0 10 * * *'   # 19:00 KST  AI뉴스
    - cron: '30 10 * * *'  # 19:30 KST  AI뉴스

    # [latest_issue] 하루 7회 – 구글 트렌드 급상승
    - cron: '0 4 * * *'    # 13:00 KST  최신이슈
    - cron: '0 7 * * *'    # 16:00 KST  최신이슈
    - cron: '0 9 * * *'    # 18:00 KST  최신이슈
    - cron: '30 9 * * *'   # 18:30 KST  최신이슈
    - cron: '0 11 * * *'   # 20:00 KST  최신이슈
    - cron: '30 13 * * *'  # 22:30 KST  최신이슈
    - cron: '30 14 * * *'  # 23:30 KST  최신이슈

  workflow_dispatch:
    inputs:
      category:
        description: '발행할 포스팅 카테고리 (auto, adpick, ai_news, latest_issue)'
        required: true
        default: 'auto'

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: auto-publish
      cancel-in-progress: false  # 큐에 넣어서 순차 실행 (이전 작업 취소 X)
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 가져오기 (rebase 충돌 방지)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Auto Publisher Pipeline
        env:
          ADPICK_AFFID: ${{ secrets.ADPICK_AFFID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py --category "${{ github.event.inputs.category || 'auto' }}"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ assets/images/posts/
          if ! git diff --cached --quiet; then
            git commit -m "feat: Auto-published blog post via GitHub Actions"
            # 원격 변경사항을 rebase로 병합 후 push (동시 실행 충돌 방지)
            git pull --rebase origin main
            git push origin main
          else
            echo "No new posts generated."
          fi
